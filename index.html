<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USANA MAMA — 비즈니스 가이드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:#F5F5F7; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .wrap { width:420px; padding:48px 0; }
  .brand { font-size:11px; font-weight:500; color:#1D9E75; letter-spacing:3px; text-align:center; margin-bottom:12px; }
  h1 { font-size:26px; font-weight:600; color:#1D1D1F; text-align:center; letter-spacing:-0.5px; margin-bottom:8px; }
  .sub { font-size:13px; color:#86868B; text-align:center; font-weight:300; margin-bottom:40px; }
  .cards { display:flex; flex-direction:column; gap:14px; }
  .card { background:#fff; border-radius:16px; border:1px solid #E5E5EA; padding:24px 28px; text-decoration:none; display:flex; align-items:center; gap:18px; transition:box-shadow .2s, transform .2s; }
  .card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); transform:translateY(-2px); }
  .card-icon { font-size:28px; flex-shrink:0; }
  .card-title { font-size:15px; font-weight:600; color:#1D1D1F; margin-bottom:4px; }
  .card-desc { font-size:12px; color:#86868B; font-weight:300; line-height:1.5; }
  .footer { text-align:center; margin-top:36px; font-size:11px; color:#C7C7CC; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">USANA MAMA</div>
  <h1>비즈니스 가이드</h1>
  <div class="sub">True Health · True Life</div>
  <div class="cards">
    <a class="card" href="onboarding.html">
      <div class="card-icon">📋</div>
      <div>
        <div class="card-title">고객 온보딩 가이드</div>
        <div class="card-desc">한 번의 고객을 평생 파트너로<br>Customer Onboarding Guide</div>
      </div>
    </a>
    <a class="card" href="pacesetter.html">
      <div class="card-icon">🏆</div>
      <div>
        <div class="card-title">페이스세터 여정 플래너</div>
        <div class="card-desc">목표를 정하고 모든 노력을 다 해보세요<br>Pacesetter Journey Planner</div>
      </div>
    </a>
  </div>
  <div class="footer">USANA MAMA · Wellness Consultant</div>
</div>
</body>
</html>
